name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compiler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ librdkafka-dev

      - name: Build
        run: |
          mkdir -p bin
          g++ -Icompiler compiler/mark.cpp -Wall -Wextra -std=c++23 -g -o bin/mark
          g++ -Icompiler worker/worker.cpp -Wall -Wextra -std=c++23 -g -lrdkafka -o bin/mark-worker

      - name: Smoke test examples
        run: |
          ./bin/mark examples/hello.mark | grep -q mark-doc
          ./bin/mark examples/academic.mark | grep -q mark-math

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -f backend/pom.xml -B package -DskipTests

      - name: Verify artifact
        run: test -f backend/target/backend-0.0.1-SNAPSHOT.jar

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, build, and lint
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm run lint

  changes:
    runs-on: ubuntu-latest
    outputs:
      compiler: ${{ steps.filter.outputs.compiler }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            compiler:
              - 'compiler/**'
              - '.github/workflows/ci.yml'

  release:
    needs: [compiler, changes]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.compiler == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build release binary
        run: |
          g++ -Icompiler compiler/mark.cpp -Wall -Wextra -std=c++23 -O2 -DNDEBUG -o mark
          strip mark

      - name: Smoke test examples
        run: |
          ./mark examples/hello.mark | grep -q mark-doc
          ./mark examples/academic.mark | grep -q mark-math

      - name: Package
        run: tar czf mark-linux-x86_64.tar.gz mark

      - name: Set release metadata
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: v0.0.${{ github.run_number }} (${{ steps.meta.outputs.short_sha }})
          generate_release_notes: true
          files: mark-linux-x86_64.tar.gz
