name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compiler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ librdkafka-dev

      - name: Build
        run: ./run.sh

      - name: Smoke test examples
        run: |
          ./bin/mark examples/hello.mark | grep -q mark-doc
          ./bin/mark examples/academic.mark | grep -q mark-math

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -f backend/pom.xml -B package -DskipTests

      - name: Verify artifact
        run: test -f backend/target/backend-0.0.1-SNAPSHOT.jar

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, build, and lint
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm run lint
